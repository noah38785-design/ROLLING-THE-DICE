<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rolling the Dice Network</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Meta -->
  <meta
    name="description"
    content="Rolling the Dice Network - CFB news, recruiting, QB battles, rankings, and dynasty coverage."
  />

  <meta
    name="keywords"
    content="CFB, College Football, Recruiting, QB Battles, Dynasty, Sports News"
  />

  <meta name="theme-color" content="#c43c2f" />

  <!-- Open Graph -->
  <meta property="og:title" content="Rolling the Dice Network" />
  <meta
    property="og:description"
    content="CFB news, recruiting, QB battles, rankings, and dynasty coverage."
  />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
    }

    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 12px;
    }

    .loading-logo {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      background: #c43c2f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
    }

    .loading-text {
      color: #ccc;
      font-size: 14px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-logo">🎲</div>
      <div class="loading-text">
        Loading Rolling the Dice Network...
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
